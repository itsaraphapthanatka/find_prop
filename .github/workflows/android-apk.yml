# สร้าง Android APK (debug) อัตโนมัติทุกครั้งที่ push ไป main
# ดาวน์โหลด: GitHub → Actions → เลือก run ล่าสุด → Artifacts → hob-debug-apk
name: Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# contents: write — สำหรับอัป APK ขึ้น GitHub Release (ลิงก์ดาวน์โหลดถาวร)
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      # ค่า public ของ Supabase (URL + anon key ซึ่งออกแบบมาให้อยู่ในบันเดิล client ได้
      # — ด่านความปลอดภัยจริงคือ RLS) ดึงจากบันเดิลเว็บ prod โดยตรง:
      # ไม่ต้องตั้ง GitHub secret และค่าตรงกับเว็บเสมอ
      - name: Extract public config from production bundle
        run: |
          set -euo pipefail
          BUNDLE=$(curl -fsS https://hob-alpha.vercel.app/ | grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' | head -1)
          curl -fsS "https://hob-alpha.vercel.app/$BUNDLE" -o /tmp/bundle.js
          URL=$(grep -oE 'https://[a-z0-9]+\.supabase\.co' /tmp/bundle.js | head -1)
          KEY=$(grep -oE 'eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+' /tmp/bundle.js | head -1)
          test -n "$URL" && test -n "$KEY"
          echo "::add-mask::$KEY"
          echo "VITE_SUPABASE_URL=$URL" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Build web
        run: npm run build
        env:
          VITE_API_BASE: https://hob-alpha.vercel.app

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hob-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ลิงก์ถาวรสำหรับมือถือ: https://github.com/itsaraphapthanatka/find_prop/releases/download/app-latest/hob.apk
      # (Artifacts ปกติต้องล็อกอิน GitHub — Release asset ของ repo public เปิดโหลดได้ตรงๆ
      #  และแอปใช้ลิงก์นี้เด้งแถบ "อัปเดตแอป" เมื่อ apkVersion ใน app-update.json ใหม่กว่าตัวเอง)
      - name: Publish APK to rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk hob.apk
          gh release create app-latest \
            --title "HOB Android APK (ตัวล่าสุดจาก main)" \
            --notes "ติดตั้งด้วยมือแค่ครั้งแรก — หลังจากนั้นแอปจะเด้งแจ้งเองเมื่อมีเวอร์ชันใหม่" \
            2>/dev/null || true
          gh release upload app-latest hob.apk --clobber
