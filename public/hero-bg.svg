<svg xmlns="http://www.w3.org/2000/svg" width="480" height="200" viewBox="0 0 480 200" fill="none">
  <!-- ลายขอบฟ้าอาคาร/โกดัง/โรงงาน สำหรับพื้นหลังฮีโร่ landing (โทนแบรนด์ จางๆ)
       ต่อกันแบบ repeat-x ได้ — เว้นช่องที่ขอบซ้าย/ขวาให้เรียงต่อดูเป็นธรรมชาติ -->
  <defs>
    <linearGradient id="b" x1="0" y1="60" x2="0" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7132f5" stop-opacity="0.05" />
      <stop offset="1" stop-color="#7132f5" stop-opacity="0.20" />
    </linearGradient>
  </defs>
  <g fill="url(#b)">
    <!-- โรงงาน หลังคาฟันเลื่อย + ปล่อง -->
    <rect x="18" y="120" width="96" height="80" />
    <path d="M18 120 L38 104 L38 120 Z M46 120 L66 104 L66 120 Z M74 120 L94 104 L94 120 Z" />
    <rect x="98" y="86" width="10" height="34" />
    <!-- โกดัง หลังคาจั่วกว้าง -->
    <path d="M132 200 V132 L188 100 L244 132 V200 Z" />
    <!-- ตึกออฟฟิศสูง -->
    <rect x="262" y="72" width="52" height="128" />
    <!-- โชว์รูม เตี้ยกว้าง + กันสาด -->
    <rect x="330" y="140" width="88" height="60" />
    <path d="M326 140 H422 L410 128 H338 Z" />
    <!-- ยูนิตเล็กท้ายแถว -->
    <rect x="436" y="150" width="30" height="50" />
  </g>
  <!-- หน้าต่างจางๆ ให้ดูเป็นอาคาร -->
  <g fill="#ffffff" fill-opacity="0.30">
    <rect x="272" y="86" width="9" height="12" /><rect x="288" y="86" width="9" height="12" />
    <rect x="272" y="108" width="9" height="12" /><rect x="288" y="108" width="9" height="12" />
    <rect x="272" y="130" width="9" height="12" /><rect x="288" y="130" width="9" height="12" />
    <rect x="345" y="152" width="12" height="14" /><rect x="366" y="152" width="12" height="14" /><rect x="387" y="152" width="12" height="14" />
  </g>
</svg>
